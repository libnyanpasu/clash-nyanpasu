mode: rule
port: 7891
socks-port: 7892
mixed-port: 7890
allow-lan: false
log-level: info
ipv6: false
secret: golden-secret
external-controller: 127.0.0.1:9090
profile:
  store-selected: true
  store-fake-ip: false
unified-delay: true
tcp-concurrent: true
proxies:
  - name: a1
    type: ss
    server: a.example.com
    port: 443
  - name: b1
    type: vmess
    server: b.example.com
    port: 8080
proxy-groups:
  - name: Auto
    type: select
    proxies:
      - a1
      - b1
